<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>폼 관련 태그</title>
</head>
<h1>기본 폼 양식</h1>
<body>
    <form action="/server/location" method="GET">
        <fieldset>
            <legend> 입력 </legend>
            <input type ="text" name ="val">
            <button type="submit">전송</button>
        </fieldset>

        <h1>폼과 입력 양식 분리</h1>
        <form id="f2" action="/server/location2" method="GET"></form>
        <form id="f3" action="/server/location2" method="GET"> </form>
        <fieldset>
            <legend>입력</legend>
            <input type="text" name="val">
            <button type="submit" form="f2">Form2 전송</button>
        </fieldset> 

        <h1>input 태그</h1>
        <!--파일 업로드시 추가 속성으로 필요 -> mathod="POST" enctype="multipart/form-data"-->
        <form action="/server/location4" mathod="GET" ></form>>
        <div>                             <!--name을 적어줘야 나중에 주소에 뜸 -->
            텍스트 입력 : <input type="text" name="V1" value="data1" minlength="2" maxlength="8" size="4" placeholder="텍스트입력" required>
        </div>
        <div>
            패스워드 입력 : <input type ="password" name="V2" value="data2" minlength="2" maxlength="8" placeholder="암호입력" required>
        </div>
        <div>
            입력 숨김 : <input type= "hidden" name="V3" value="data3 readonly">
        </div>
        <div>
            체크박스 : <input type = "checkbox" id="c1" name="v4" value="data4" checked ><label for="c1">가</label> <input type = "checkbox"  id="c2" name="v4" value="data5"> <label for="c2">나</label> <input type = "checkbox" id="c3" name="v4" value="data6"><label for="c3">다</label>  
        </div>
        <div>
            라디오버튼 : <input type = "radio" id="r1" name="v5" value="data7"><label id for="r1">가</label>
             <input type = "radio"  id="r2" name="v5" value="data8" checked ><label id for="r2">나</label> 
             <input type = "radio"  id="r3" name="v5" value="data9"><label id for="r3">다</label>
        </div>
        <div>
            각종버튼 : <input type = "button" value="버튼" onclick="alert('클릭!')"> 
            <input type="submit" value="전송"> 
            <input type="reset" value="초기화">
        </div>
        <div>
            이미지 : <input type="image" src="/project4/static/icon/flower.png " onclick="alert('왕 큰 꽃!!')">
        </div>
        <div>
            파일선택 : <input type = "file" name="v6" accept=".txt,.prop,image/png" multiple>
        </div>
        <div>
            색 선택 : <input type="color" name="v7" oninput="color_out.value=this.value">
            <output name="color_out"></output>
        </div>
        <div>
            날짜 입력 : <input type="date" name="v8" value="2021-09-30" min="2021-01-01" max="2021-12-31">
        </div>
        <div>
            시간 입력 : <input type = "time" name="v9" value="15:30" min:"09:00" max="11:59">
        </div>
        <div>
            이메일 입력 : <input type="email" name="v10">
        </div>
        <div>
            음량 :  <input type="range" id="rng" name="v11"
            min="10" max="100" step="10" list="marking" oninput="out.value=this.value">
            <datalist id="marking">
                <option value="10"></option>
                <option value="20"></option>
                <option value="30"></option>
                <option value="40"></option>
                <option value="50"></option>
                <option value="60"></option>
                <option value="70"></option>
                <option value="80"></option>
                <option value="90"></option>
                <option value="100"></option>
            </datalist>
            <output name="out"></output>
        </div>
        <div>
            <select name="v12" size="3" multiple>
                <optgroup label="분류1">
                <option value="s1">선택/콤보박스1</option>
                <option value="s2" selected >선택/콤보박스2</option>
            </optgroup>
            <optgroup label="분류2">
                <option value="s3">선택/콤보박스3</option>
                <option value="s4">선택/콤보박스4</option>
            </optgroup>
            </select>
        </div>

        <div>
            <textarea name="v14" cols="30" rows="10" placeholder="500자 제한 입력" minlength="10" maxlength="20" style="resize:none;"></textarea>
        </div>

        <!--다운로드 될 때 얼마나 진행 되었는지 보여주는 상태바?임-->
        <div>
            <progress value="20" max="100"></progress>
        </div>
        <div>
            <meter value="20" min="0" max="100" low="25" high="75" optimum="50"></meter><br>
            <meter value="50" min="0" max="100" low="25" high="75" optimum="50"></meter><br>
            <meter value="80" min="0" max="100" low="25" high="75" optimum="50"></meter>
        </div>
        <div>
            <button type="submit">전송</button>
            <button type="reset">초기화</button>
            <button type="button">버튼</button>
        </div>
    </form>

</body>
</html>
