<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link type="text/css" rel="stylesheet" href="/static/css/ch08_1.css">
    <link type="txt/css" rel="stylesheet" href="/static/css/ch08_2.css" media="screen and(max-width:600px)">
</head>
<body>
    <script>
        // width와 height 크기 출력 
        window.onresize =
            function() {
                var w = document.getElementById("w");
                var h = document.getElementById("h");
                w.innerText = window.innerWidth;
                h.innerText = window.innerHeight;
                /*w.innerHTML = "<b>"+window.innerWidth+"</b>";
                h.innerHTML = "<b>"+window.innerHeight+"</b>";*/
                //innerText는 모든걸 텍스트로 보여주고 innerHTML은 태그는 태그로 인식해준다.
            };
    
    </script>
    <section id="main">
        <article>
            브라우저 크기 width : <span id="w"></span>
        </article>
        <article>
            브라우저 크기 height : <span id="h"></span>
        </article>
    </section>
    
</body>
</html>
